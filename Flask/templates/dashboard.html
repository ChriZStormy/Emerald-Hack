<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - {{ data.sector if data else 'Cargando...' }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: #0a0a0a; color: white;">

    <nav class="sector-header">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="btn-sector">← Volver</a>
            <h4 class="emerald-text m-0">{{ data.sector if data else 'Sector' }}</h4>
        </div>
    </nav>

    <div class="container mt-5">
        {% if data %}
        <div class="row">
            <div class="col-md-7">
                <div class="registration-card" style="max-width: 100%;">
                    <h5 class="emerald-text mb-4">Tendencia de Demanda Predictiva</h5>
                    <canvas id="graficaPrediccion" 
                            data-labels='{{ data.labels | tojson | safe }}' 
                            data-valores='{{ data.valores | tojson | safe }}'>
                    </canvas>
                </div>
            </div>

            <div class="col-md-5">
                <div class="registration-card mb-4" style="max-width: 100%;">
                    <h5 class="text-info">Predicción del Modelo</h5>
                    <p class="lead" style="font-size: 1.1rem;">{{ data.prediccion }}</p>
                </div>

                <div class="registration-card" style="max-width: 100%; border-left: 4px solid #00FF7F;">
                    <h5 class="emerald-text">💡 Recomendación IA (Gemini)</h5>
                    <p style="color: #a0a0a0; line-height: 1.6; font-size: 1rem;">
                        {{ data.insight_gemini }}
                    </p>
                </div>
            </div>
        </div>
        {% else %}
        <div class="text-center mt-5">
            <h2 class="emerald-text">Error: No se pudieron cargar los datos del sector.</h2>
            <a href="/" class="btn btn-outline-light mt-3">Regresar al inicio</a>
        </div>
        {% endif %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('graficaPrediccion');
            
            // Si el canvas no existe (por el if de Flask), detenemos el script
            if (!canvas) return;

            try {
                // Parseamos los datos que inyectó Flask en el HTML
                const labels = JSON.parse(canvas.getAttribute('data-labels'));
                const valores = JSON.parse(canvas.getAttribute('data-valores'));

                const ctx = canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Demanda Proyectada',
                            data: valores,
                            borderColor: '#00FF7F',
                            backgroundColor: 'rgba(0, 255, 127, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 3,
                            pointBackgroundColor: '#00FF7F'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: { 
                                grid: { color: '#222' }, 
                                ticks: { color: '#a0a0a0' },
                                beginAtZero: true
                            },
                            x: { 
                                grid: { color: '#222' }, 
                                ticks: { color: '#a0a0a0' } 
                            }
                        },
                        plugins: {
                            legend: { 
                                labels: { color: 'white', font: { size: 14 } } 
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Error renderizando la gráfica:", error);
            }
        });
    </script>
</body>
</html>
