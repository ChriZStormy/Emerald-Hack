<!DOCTYPE html>
<html>
<head>
    <title>Mini Chatbot</title>
</head>
<body>

    <h2>Usuarios</h2>

    <ul>
        {% for u in usuarios %}
            <li>
                {{ u.nombre }} - {{ u.curp }}
                <a href="/expediente/{{ u.curp }}">Ver expediente</a>
            </li>
        {% endfor %}
    </ul>

    <a href="/">Volver</a>

</body>
</html>
